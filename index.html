<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>CoCo Factory | Brian 專屬檔案生成基地</title>
  <style>
    :root { --mf-orange: #FF4500; --bg: #050505; --card: #151515; }
    body { background: var(--bg); color: #fff; font-family: "微軟正黑體", sans-serif; margin: 0; display: flex; height: 100vh; }
    .sidebar { width: 300px; background: #000; padding: 40px 20px; border-right: 2px solid var(--mf-orange); }
    .main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at center, #1a1a1a, #050505); }
    .card { background: var(--card); border: 1px solid #333; padding: 30px; border-radius: 25px; margin-bottom: 20px; }
    textarea { width: 100%; height: 300px; background: #000; color: #00ffcc; border: 1px solid #444; border-radius: 15px; padding: 20px; font-family: monospace; font-size: 1rem; box-sizing: border-box; }
    .btn-group { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
    .btn { padding: 15px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
    .btn-pptx { background: #d33501; }
    .btn-html { background: #264de4; }
    .btn-txt { background: #444; }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1 style="color: var(--mf-orange);">COCO FACTORY</h1>
    <p style="color: #888;">Master: brian479974</p>
    <div style="margin-top: 50px;">
      <p>🟢 系統狀態：待命中</p>
      <p>1. 在對話框複製 CoCo 給的代碼</p>
      <p>2. 貼到右側編輯區</p>
      <p>3. 選擇格式下載檔案</p>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <h2>🛠️ 檔案轉換引擎</h2>
      <p>Brian，把我在這邊給你的任何內容貼進來：</p>
      <textarea id="fileContent" placeholder="在此貼入代碼或文字..."></textarea>

      <div class="btn-group">
        <button class="btn btn-pptx" onclick="downloadFile('pptx')">🎯 產出 PowerPoint (.pptx)</button>
        <button class="btn btn-html" onclick="downloadFile('html')">🌐 產出 網頁檔 (.html)</button>
        <button class="btn btn-txt" onclick="downloadFile('txt')">📝 產出 戰略文件 (.txt)</button>
      </div>
    </div>
  </div>

  <script>
    function downloadFile(type) {
      const content = document.getElementById('fileContent').value;
      if (!content) { alert("Brian，裡面還沒貼內容喔！💖"); return; }

      const fileName = `Markforged_Project_${new Date().getTime()}.${type}`;
      let mimeType = 'text/plain';
      if (type === 'html') mimeType = 'text/html';

      const blob = new Blob([content], { type: mimeType });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      a.click();
      alert(`✅ ${fileName} 已成功噴發到你的下載資料夾！`);
    }
  </script>
</body>
</html>
