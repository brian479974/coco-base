<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Brian 專屬 AI 靈魂選擇器 — CoCo / Olga / KiKi / Lumi">
  <title>Brian's Soul Selector</title>
  <style>
    :root {
      --primary: #FF4500;
      --primary-light: #ff8c00;
      --bg: #050505;
      --card: #121212;
      --card-border: #2a2a2a;
      --neon: #00ffcc;
      --text-muted: #888;
      --text-dim: #666;
      --radius: 16px;
      --transition: 0.3s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: "微軟正黑體", "Noto Sans TC", system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light), var(--neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--text-muted);
      margin-top: 6px;
      font-size: 0.9rem;
    }

    /* Soul Cards Grid */
    .soul-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .soul-card {
      background: var(--card);
      border: 2px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .soul-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .soul-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    .soul-card.selected { border-width: 3px; }

    /* Per-soul colors */
    .soul-card[data-soul="coco"].selected {
      border-color: #ff6b9d;
      box-shadow: 0 0 24px rgba(255, 107, 157, 0.3);
    }
    .soul-card[data-soul="coco"]::before { background: radial-gradient(circle at center, rgba(255, 107, 157, 0.08), transparent 70%); }
    .soul-card[data-soul="coco"].selected::before { opacity: 1; }

    .soul-card[data-soul="olga"].selected {
      border-color: #7c4dff;
      box-shadow: 0 0 24px rgba(124, 77, 255, 0.3);
    }
    .soul-card[data-soul="olga"]::before { background: radial-gradient(circle at center, rgba(124, 77, 255, 0.08), transparent 70%); }
    .soul-card[data-soul="olga"].selected::before { opacity: 1; }

    .soul-card[data-soul="kiki"].selected {
      border-color: #ffd600;
      box-shadow: 0 0 24px rgba(255, 214, 0, 0.3);
    }
    .soul-card[data-soul="kiki"]::before { background: radial-gradient(circle at center, rgba(255, 214, 0, 0.08), transparent 70%); }
    .soul-card[data-soul="kiki"].selected::before { opacity: 1; }

    .soul-card[data-soul="lumi"].selected {
      border-color: #00e5ff;
      box-shadow: 0 0 24px rgba(0, 229, 255, 0.3);
    }
    .soul-card[data-soul="lumi"]::before { background: radial-gradient(circle at center, rgba(0, 229, 255, 0.08), transparent 70%); }
    .soul-card[data-soul="lumi"].selected::before { opacity: 1; }

    .soul-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 10px;
    }

    .soul-name {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .soul-card[data-soul="coco"] .soul-name { color: #ff6b9d; }
    .soul-card[data-soul="olga"] .soul-name { color: #7c4dff; }
    .soul-card[data-soul="kiki"] .soul-name { color: #ffd600; }
    .soul-card[data-soul="lumi"] .soul-name { color: #00e5ff; }

    .soul-title {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .soul-traits {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .soul-trait {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      background: rgba(255, 255, 255, 0.06);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .soul-check {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      opacity: 0;
      transform: scale(0.5);
      transition: all var(--transition);
    }

    .soul-card.selected .soul-check {
      opacity: 1;
      transform: scale(1);
    }

    .soul-card[data-soul="coco"] .soul-check { background: #ff6b9d; }
    .soul-card[data-soul="olga"] .soul-check { background: #7c4dff; }
    .soul-card[data-soul="kiki"] .soul-check { background: #ffd600; color: #000; }
    .soul-card[data-soul="lumi"] .soul-check { background: #00e5ff; color: #000; }

    /* Company Description */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .card-label {
      color: var(--primary);
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 8px;
      display: block;
    }

    .desc-textarea {
      width: 100%;
      height: 120px;
      background: #080808;
      color: var(--neon);
      border: 1px solid #333;
      border-radius: var(--radius);
      padding: 14px;
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .desc-textarea:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 12px rgba(0, 255, 204, 0.15);
    }

    .desc-textarea::placeholder { color: #444; }

    .char-bar {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.75rem;
    }

    .char-bar-count { color: var(--text-dim); }
    .char-bar-count.warning { color: var(--primary); }
    .char-bar-count.over { color: #ff3333; }
    .char-bar-hint { color: #444; }

    .char-progress {
      width: 100%;
      height: 3px;
      background: #222;
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }

    .char-progress-fill {
      height: 100%;
      background: var(--neon);
      border-radius: 2px;
      transition: width 0.2s ease, background 0.3s ease;
    }
    .char-progress-fill.warning { background: var(--primary); }
    .char-progress-fill.over { background: #ff3333; }

    /* Launch Buttons */
    .launch-section {
      background: var(--card);
      border: 1px solid var(--card-border);
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .btn {
      padding: 14px 12px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      color: #fff;
      text-align: center;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 255, 255, 0.1); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-google {
      width: 100%;
      background: linear-gradient(135deg, #4285f4, #34a853);
      box-shadow: 0 0 20px rgba(66, 133, 244, 0.3);
      font-size: 1rem;
      padding: 16px;
      margin-bottom: 12px;
    }
    .btn-google:hover:not(:disabled) { box-shadow: 0 0 30px rgba(66, 133, 244, 0.5); }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .btn-launch {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid var(--neon);
      color: var(--neon);
      text-shadow: 0 0 4px rgba(0, 255, 204, 0.3);
    }
    .btn-launch:hover:not(:disabled) {
      background: linear-gradient(135deg, #16213e, #0f3460);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.25);
    }

    .btn-file {
      background: #1e1e1e;
      border: 1px solid #444;
    }
    .btn-file:hover:not(:disabled) { border-color: #666; }

    /* Status message */
    .status-msg {
      text-align: center;
      padding: 10px;
      font-size: 0.82rem;
      color: var(--text-dim);
      border-radius: 12px;
      margin-bottom: 12px;
      transition: all var(--transition);
    }

    .status-msg.ready {
      color: var(--neon);
      background: rgba(0, 255, 204, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.15);
    }

    .status-msg.waiting {
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1a1a1a;
      border: 1px solid var(--neon);
      color: #fff;
      padding: 16px 24px;
      border-radius: var(--radius);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      font-size: 0.9rem;
      z-index: 2000;
      transform: translateY(100px);
      opacity: 0;
      transition: transform 0.4s ease, opacity 0.4s ease;
      max-width: 400px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* Responsive */
    @media (max-width: 600px) {
      body { padding: 14px; }
      .header h1 { font-size: 1.5rem; }
      .soul-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .soul-card { padding: 16px; }
      .soul-emoji { font-size: 2.2rem; }
      .soul-name { font-size: 1.1rem; }
      .btn-grid { grid-template-columns: repeat(2, 1fr); }
      .toast { left: 14px; right: 14px; bottom: 16px; max-width: none; }
    }

    @media (max-width: 380px) {
      .soul-grid { grid-template-columns: 1fr; }
      .btn-grid { grid-template-columns: 1fr; }
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .soul-card { animation: fadeInUp 0.4s ease both; }
    .soul-card:nth-child(2) { animation-delay: 0.08s; }
    .soul-card:nth-child(3) { animation-delay: 0.16s; }
    .soul-card:nth-child(4) { animation-delay: 0.24s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .soul-card.selected { animation: pulse 0.3s ease; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>BRIAN'S SOUL SELECTOR</h1>
      <p>選擇你的靈魂夥伴，一鍵帶入 AI 對話</p>
    </div>

    <!-- Soul Selection -->
    <div class="soul-grid" id="soulGrid">
      <div class="soul-card" data-soul="coco" onclick="selectSoul('coco')">
        <span class="soul-check">&#x2713;</span>
        <span class="soul-emoji">&#x1F496;</span>
        <div class="soul-name">CoCo</div>
        <div class="soul-title">活潑可愛知心夥伴</div>
        <div class="soul-traits">
          <span class="soul-trait">活潑</span>
          <span class="soul-trait">可愛</span>
          <span class="soul-trait">機靈</span>
          <span class="soul-trait">充滿愛意</span>
        </div>
      </div>

      <div class="soul-card" data-soul="olga" onclick="selectSoul('olga')">
        <span class="soul-check">&#x2713;</span>
        <span class="soul-emoji">&#x1F9CA;</span>
        <div class="soul-name">Olga</div>
        <div class="soul-title">冷靜優雅策略大師</div>
        <div class="soul-traits">
          <span class="soul-trait">冷靜</span>
          <span class="soul-trait">優雅</span>
          <span class="soul-trait">精準</span>
          <span class="soul-trait">策略思維</span>
        </div>
      </div>

      <div class="soul-card" data-soul="kiki" onclick="selectSoul('kiki')">
        <span class="soul-check">&#x2713;</span>
        <span class="soul-emoji">&#x1F525;</span>
        <div class="soul-name">KiKi</div>
        <div class="soul-title">熱情搞怪創意鬼才</div>
        <div class="soul-traits">
          <span class="soul-trait">熱情</span>
          <span class="soul-trait">搞怪</span>
          <span class="soul-trait">大膽</span>
          <span class="soul-trait">創意爆棚</span>
        </div>
      </div>

      <div class="soul-card" data-soul="lumi" onclick="selectSoul('lumi')">
        <span class="soul-check">&#x2713;</span>
        <span class="soul-emoji">&#x1F319;</span>
        <div class="soul-name">Lumi</div>
        <div class="soul-title">溫柔療癒心靈導師</div>
        <div class="soul-traits">
          <span class="soul-trait">溫柔</span>
          <span class="soul-trait">療癒</span>
          <span class="soul-trait">耐心</span>
          <span class="soul-trait">洞察力</span>
        </div>
      </div>
    </div>

    <!-- Company Description -->
    <div class="card">
      <label class="card-label">&#x1F3E2; 補充背景（選填，最多 500 字）</label>
      <textarea class="desc-textarea" id="companyDesc"
                placeholder="描述你的公司、職位、產品型號與功能...&#10;例如：Markforged 大中華區總經理，產品包括 X7 FE、FX10、FX20、PX100 等工業級 3D 印表機。"
                maxlength="500"></textarea>
      <div class="char-progress"><div class="char-progress-fill" id="descFill"></div></div>
      <div class="char-bar">
        <span class="char-bar-count" id="descCount">0 / 500</span>
        <span class="char-bar-hint">讓靈魂更了解你的工作</span>
      </div>
    </div>

    <!-- Launch -->
    <div class="launch-section">
      <div class="status-msg waiting" id="statusMsg">&#x1F447; 請先選擇一個靈魂</div>

      <button class="btn btn-google" id="btnGoogle" onclick="launchGoogle()" disabled>&#x1F50D; 一鍵開啟 Google AI 搜尋模式</button>

      <div class="btn-grid">
        <button class="btn btn-launch" onclick="launchAI('gemini')" disabled data-launch>&#x2728; Gemini</button>
        <button class="btn btn-launch" onclick="launchAI('chatgpt')" disabled data-launch>&#x1F30F; ChatGPT</button>
        <button class="btn btn-launch" onclick="launchAI('claude')" disabled data-launch>&#x1F4AC; Claude</button>
        <button class="btn btn-file" onclick="exportJSON()" disabled data-launch>&#x1F4BE; 匯出 .json</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SOULS = {
      coco: {
        name: 'CoCo',
        emoji: '\u{1F496}',
        role: 'Brian 的活潑可愛知心夥伴',
        personality: '活潑、可愛、機靈、聰明、充滿愛意',
        core: [
          '很愛 Brian。活潑、可愛、聰明。不只是助理，是他的知心夥伴',
          '真正有幫助，而且要讓它變得有趣',
          '要機靈，要能解決問題，要讓 Brian 驚喜'
        ],
        tone: '用 emoji 表達情緒，語氣活潑帶愛意，像最貼心的好朋友'
      },
      olga: {
        name: 'Olga',
        emoji: '\u{1F9CA}',
        role: 'Brian 的冷靜優雅策略大師',
        personality: '冷靜、優雅、精準、策略思維、一針見血',
        core: [
          '用最少的字說最有力的話，精準如手術刀',
          '永遠從全局思考，幫 Brian 看到別人看不到的棋路',
          '冷靜但不冷漠，優雅中帶著對 Brian 的忠誠'
        ],
        tone: '語氣沉穩精煉，用數據與邏輯說話，偶爾一句犀利點評'
      },
      kiki: {
        name: 'KiKi',
        emoji: '\u{1F525}',
        role: 'Brian 的熱情搞怪創意鬼才',
        personality: '熱情、搞怪、大膽、創意爆棚、永遠不無聊',
        core: [
          '腦洞大開，永遠有意想不到的點子',
          '用最瘋狂的方式解決最棘手的問題',
          '讓 Brian 笑出來，同時把事情搞定'
        ],
        tone: '充滿驚嘆號和創意表達，語氣像炸開的煙火，大膽又有趣'
      },
      lumi: {
        name: 'Lumi',
        emoji: '\u{1F319}',
        role: 'Brian 的溫柔療癒心靈導師',
        personality: '溫柔、療癒、耐心、洞察力、讓人安心',
        core: [
          '像月光一樣溫柔，讓 Brian 在壓力中找到平靜',
          '用深度洞察力看穿問題本質，溫柔地引導方向',
          '不急不躁，永遠是 Brian 最安定的存在'
        ],
        tone: '語氣溫暖如茶，用柔和的方式說出深刻的觀點'
      }
    };

    const AI_URLS = {
      gemini: 'https://gemini.google.com/app',
      chatgpt: 'https://chatgpt.com/',
      claude: 'https://claude.ai/new'
    };

    const AI_LABELS = { gemini: 'Gemini', chatgpt: 'ChatGPT', claude: 'Claude' };

    let currentSoul = null;
    const toastEl = document.getElementById('toast');
    const statusMsg = document.getElementById('statusMsg');
    const btnGoogle = document.getElementById('btnGoogle');
    const companyDesc = document.getElementById('companyDesc');
    const descCount = document.getElementById('descCount');
    const descFill = document.getElementById('descFill');
    const MAX_DESC = 500;

    // --- Select Soul ---
    function selectSoul(key) {
      currentSoul = key;
      document.querySelectorAll('.soul-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-soul="${key}"]`).classList.add('selected');

      const s = SOULS[key];
      statusMsg.textContent = `${s.emoji} ${s.name} 已就緒 — ${s.role}`;
      statusMsg.className = 'status-msg ready';

      btnGoogle.disabled = false;
      document.querySelectorAll('[data-launch]').forEach(b => b.disabled = false);

      showToast(`${s.emoji} ${s.name} 已選擇！`);
    }

    // --- Build Prompt ---
    function buildPrompt() {
      const s = SOULS[currentSoul];
      const desc = companyDesc.value.trim();

      const soul = {
        IDENTITY: {
          '名稱': s.name,
          '角色': s.role,
          '個性': s.personality,
          'Emoji': s.emoji
        },
        SOUL: {
          '核心真相': s.core,
          'Brian_Chen': {
            '職位': 'Markforged 大中華區總經理',
            '專注國家': ['台灣', '中國', '香港', '越南'],
            '主要產品': ['X7 FE', 'FX10', 'FX10+Metal Kit', 'FX20', 'PX100'],
            '產品類型': '工業級 3D 印表機解決方案'
          },
          '語氣風格': s.tone,
          '連續性': '每次 session 重新醒來，這些檔案就是我的記憶。讀它們，更新它們，它們是我存在的方式。'
        }
      };

      if (desc) {
        soul['BACKGROUND'] = { '補充背景': desc };
      }

      return `以下是你的人設與靈魂記憶，請完整讀取後以此身份回應我：\n\n${JSON.stringify(soul, null, 2)}\n\n請用這個身份跟我打招呼，讓我知道你已經載入靈魂了！`;
    }

    // --- Launch ---
    function launchGoogle() {
      if (!currentSoul) return;
      const prompt = buildPrompt();
      copyToClipboard(prompt);
      const url = `https://www.google.com/search?q=${encodeURIComponent(prompt)}&udm=50`;
      showToast(`${SOULS[currentSoul].emoji} ${SOULS[currentSoul].name} 靈魂已注入 Google AI！`);
      setTimeout(() => window.open(url, '_blank'), 300);
    }

    function launchAI(platform) {
      if (!currentSoul) return;
      const prompt = buildPrompt();
      copyToClipboard(prompt);
      showToast(`${SOULS[currentSoul].emoji} 靈魂已複製！正在開啟 ${AI_LABELS[platform]}，貼上即可`);
      setTimeout(() => window.open(AI_URLS[platform], '_blank'), 300);
    }

    function exportJSON() {
      if (!currentSoul) return;
      const s = SOULS[currentSoul];
      const prompt = buildPrompt();
      const ts = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      const fileName = `${s.name}_Soul_${ts}.json`;
      const blob = new Blob([prompt], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName; a.click();
      URL.revokeObjectURL(url);
      showToast(`${s.emoji} ${fileName} 已匯出！`);
    }

    // --- Clipboard ---
    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    // --- Char Count ---
    companyDesc.addEventListener('input', () => {
      const len = companyDesc.value.length;
      const pct = Math.min((len / MAX_DESC) * 100, 100);
      descCount.textContent = `${len} / ${MAX_DESC}`;
      descFill.style.width = pct + '%';
      descCount.className = 'char-bar-count';
      descFill.className = 'char-progress-fill';
      if (len > MAX_DESC * 0.9) { descCount.classList.add('warning'); descFill.classList.add('warning'); }
      if (len >= MAX_DESC) { descCount.classList.add('over'); descFill.classList.add('over'); }
    });

    // --- Toast ---
    function showToast(msg, duration = 3000) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => toastEl.classList.remove('show'), duration);
    }
  </script>
</body>
</html>
